name: lars
on:
  pull_request:
    paths:
      - 1-DevOps/idempotweet/**
      - .github/workflows/**
  workflow_call:
jobs:
  ci:
    runs-on: ${{ vars.RUNNER || 'self-hosted' }}
    defaults: 
      run: 
        working-directory: 1-DevOps/idempotweet
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable corepack
        run: corepack enable
        working-directory: .
      - name: Yarn install
        run: yarn install --immutable
      - name: Yarn test
        run: yarn test
      - name: Yarn test coverage
        run: yarn test:coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: 1-DevOps/idempotweet
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}