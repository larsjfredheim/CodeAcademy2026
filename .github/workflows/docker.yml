name: Docker
on:
  push: 
    branches:
      - main
    paths:
      - 1-DevOps/idempotweet/**
      - 1-DevOps/2-Docker/**
      - .github/workflows/**
  workflow_dispatch: 
env: 
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  ci:
    uses: ./.github/workflows/ci.yml
  build-and-push:
    needs: ci
    runs-on: ${{ vars.RUNNER || 'self-hosted' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: 1-DevOps/idempotweet
          file: 1-DevOps/2-Docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false